<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>DjangoMart - Sign In</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .brand span { color: #0d6efd; }
        .form-control { border-radius: 8px; padding: 12px 16px; border: 1.5px solid #e0e0e0; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.1); }
        .btn-primary { border-radius: 8px; padding: 12px; font-weight: 600; }
        .divider { position: relative; text-align: center; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e0e0e0; }
        .divider span { background: #fff; padding: 0 12px; position: relative; color: #999; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <a href="{% url 'home' %}" class="text-decoration-none">
                    <h2 class="brand fw-bold"><span>Django</span>Mart</h2>
                </a>
                <p class="text-muted">Sign in to your account</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show rounded-3">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <div class="card auth-card">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Welcome Back!</h5>
                    <form method="post" action="{% url 'signin' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" name="username" placeholder="Enter your username" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" name="pass" placeholder="Enter your password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Sign In <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </form>
                    <div class="divider my-4"><span>or</span></div>
                    <p class="text-center text-muted small mb-0">
                        Don't have an account? 
                        <a href="{% url 'signup' %}" class="text-primary fw-semibold text-decoration-none">Create one</a>
                    </p>
                </div>
            </div>
            <p class="text-center text-muted small mt-4">
                <a href="{% url 'home' %}" class="text-muted"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
