<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>DjangoMart - Sign Up</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; padding: 40px 0; }
        .auth-card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .brand span { color: #0d6efd; }
        .form-control { border-radius: 8px; padding: 12px 16px; border: 1.5px solid #e0e0e0; }
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.1); }
        .btn-primary { border-radius: 8px; padding: 12px; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <a href="{% url 'home' %}" class="text-decoration-none">
                    <h2 class="brand fw-bold"><span>Django</span>Mart</h2>
                </a>
                <p class="text-muted">Create your account</p>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show rounded-3">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <div class="card auth-card">
                <div class="card-body p-4">
                    <h5 class="fw-bold mb-4">Create Account</h5>
                    <form method="post" action="{% url 'signup' %}">
                        {% csrf_token %}
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label fw-semibold small">First Name</label>
                                <input type="text" class="form-control" name="fname" placeholder="First name" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold small">Last Name</label>
                                <input type="text" class="form-control" name="lname" placeholder="Last name" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                <input type="text" class="form-control border-start-0" name="username" placeholder="Choose a username" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0" name="email" placeholder="Your email address" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" name="pass" placeholder="Create a password" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                                <input type="password" class="form-control border-start-0" name="cpass" placeholder="Confirm your password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Create Account <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </form>
                    <p class="text-center text-muted small mb-0 mt-4">
                        Already have an account? 
                        <a href="{% url 'signin' %}" class="text-primary fw-semibold text-decoration-none">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
