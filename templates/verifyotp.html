<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>DjangoMart - Verify OTP</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .brand span { color: #0d6efd; }
        .otp-input { letter-spacing: 8px; font-size: 1.5rem; text-align: center; border-radius: 8px; padding: 14px; border: 2px solid #e0e0e0; }
        .otp-input:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,0.1); outline: none; }
        .btn-primary { border-radius: 8px; padding: 12px; font-weight: 600; }
        .otp-icon { width: 80px; height: 80px; background: #e8f0fe; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <a href="{% url 'home' %}" class="text-decoration-none">
                    <h2 class="brand fw-bold"><span>Django</span>Mart</h2>
                </a>
            </div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show rounded-3">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}

            <div class="card auth-card">
                <div class="card-body p-4 text-center">
                    <div class="otp-icon mb-3">
                        <i class="bi bi-shield-check text-primary fs-2"></i>
                    </div>
                    <h5 class="fw-bold mb-2">Verify Your Email</h5>
                    <p class="text-muted small mb-4">We've sent a 5-digit OTP to your email address. Please enter it below to complete your registration.</p>
                    <form method="post" action="{% url 'verify_otp' %}">
                        {% csrf_token %}
                        <div class="mb-4">
                            <input type="text" class="form-control otp-input" name="otp" placeholder="_ _ _ _ _" maxlength="5" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            Verify OTP <i class="bi bi-check-circle ms-2"></i>
                        </button>
                    </form>
                    <p class="text-muted small mt-4 mb-0">
                        Didn't receive the code? 
                        <a href="{% url 'signup' %}" class="text-primary fw-semibold text-decoration-none">Try again</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
